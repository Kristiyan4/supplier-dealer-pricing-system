services:
  mysql:
    image: mysql:8.0
    container_name: supplier_dealer_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: supplier_dealer_system
    ports:
      - "3307:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - supplier_dealer_data:/var/lib/mysql

volumes:
  supplier_dealer_data:
